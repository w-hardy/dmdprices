url: https://w-hardy.github.io/dmdprices/

template:
  bootstrap: 5

home:
  title: dmdprices
  description: Look up medicine prices from the NHS dm+d
  links:
  - text: Interactive apps
    href: articles/apps.html
  - text: Get started
    href: articles/dmdprices.html
  - text: Reference
    href: reference/index.html
  - text: Report an issue
    href: https://github.com/w-hardy/dmdprices/issues

navbar:
  structure:
    left: [intro, reference, articles, apps, news]
    right: [github]
  components:
    github:
      icon: fab fa-github fa-lg
      href: https://github.com/w-hardy/dmdprices
      aria-label: GitHub
    apps:
      text: Apps
      menu:
        - text: dm+d Price Lookup
          href: articles/apps.html#dmd-price-lookup
        - text: NHS CII Cost Adjuster
          href: articles/apps.html#nhs-cii-cost-adjuster

reference:
  - title: "Price lookup"
    desc: "Query medicine prices from the dm+d"
    contents:
      - dmd_price_lookup
      - dmd_load
  - title: "Inflation adjustment"
    desc: "Adjust costs using NHS Cost Inflation Index (NHS CII)"
    contents:
      - nhscii
      - inflate_nhscii
  - title: "Shiny apps"
    desc: "Launch interactive apps locally"
    contents:
      - run_dmd_price_lookup
      - run_inflate_nhscii
  - title: "Data"
    desc: "Bundled dataset"
    contents:
      - dmd_master
  - title: "Package"
    contents:
      - dmdprices-package

articles:
  - title: "Get started"
    navbar: ~
    contents:
      - dmdprices
      - apps
  - title: "Inflation"
    contents:
      - nhscii
      - cost_analysis_workflows
  - title: "Price matching and data"
    contents:
      - drug_tariff_matching
      - advanced_matching
      - data_sources_updates
      - troubleshooting

news:
  releases:
    - text: "Version 0.3.0"
      href: news/index.html
    - text: "Version 0.2.0"
      href: news/index.html
